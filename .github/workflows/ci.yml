name: ci
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  ci:
    strategy:
      fail-fast: false  # https://github.com/actions/runner-images#available-images
      matrix:  # https://www.lua.org/versions.html
        os: [macos-26, macos-26-intel, ubuntu-26.04, ubuntu-26.04-arm]
        lua-version: [5.5]
    runs-on: ${{ matrix.os }}
    steps:
      - run: echo "${{ runner.os }} on ${{ runner.arch }}"
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lua${{ matrix.lua-version }} liblua${{ matrix.lua-version }}-dev luarocks
          mkdir -p "$HOME/.luarocks"
          luarocks config lua_interpreter lua5.5
          # luarocks config lua_version lua5.5
          luarocks config lua_incdir /usr/include/lua5.5
          luarocks config lua_libdir /usr/lib/x86_64-linux-gnu
          # luarocks config lua_interpreter lua5.5
          cp $HOME/.luarocks/config-5.1.lua $HOME/.luarocks/config-5.5.lua
          ls -la "$HOME/.luarocks"
          luarocks config
      - if: runner.os == 'macOS'
        run: |
          brew update
          brew install lua@${{ matrix.lua-version }} luarocks
          luarocks config lua_interpreter
        env:  # Supress the silly Homebrew GitHub Actions warnings
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
      - run: lua${{ matrix.lua-version }} -v && luarocks --version
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
          pip-install: --editable .
      - if: runner.os == 'Linux'
        run: |
          luarocks config variables.LUA_INCDIR
          luarocks config variables.LUA_INCDIR "/usr/include/lua${{ matrix.lua-version }}"
      - if: runner.os == 'macOS' && runner.arch == 'arm64'
        # /opt/homebrew/opt/lua/lib --> /opt/homebrew/lib
        run: luarocks config variables.LUA_LIBDIR "$HOMEBREW_PREFIX/lib"
      # - if: runner.os == 'Linux' && runner.arch == 'x64'
      #  uses: lunarmodules/luacheck@v1  # luacheck currently fails on this codebase
      # - if: runner.os == 'Linux'
      #   run: |
      #     # ls "$HOME/.luarocks" | true
      #     # mkdir -p "$HOME/.luarocks"
      #     luarocks --lua-version=${{ matrix.lua-version }} config --scope=user variables.LUA_INCDIR "/usr/include/lua${{ matrix.lua-version }}"
      #     luarocks --lua-version=${{ matrix.lua-version }} config --scope=user variables.LUA_LIBDIR "/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
      - run: luarocks --lua-version=${{ matrix.lua-version }} lint lunatic-python-scm-0.rockspec
      - run: luarocks --lua-version=${{ matrix.lua-version }} lint rockspecs/lunatic-python-1.0-1.rockspec
      - run: which lua${{ matrix.lua-version }} && which luarocks || true
      - run: whereis lua${{ matrix.lua-version }} && whereis luarocks || true
      - env:
          LUA_INCDIR: "/usr/include/lua${{ matrix.lua-version }}"
          LUA_LIBDIR: "/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          VERBOSE: 1
        run: |
          # luarocks --lua-version=${{ matrix.lua-version }} config variables.LUA_INCDIR
          # luarocks --lua-version=${{ matrix.lua-version }} config variables.LUA_LIBDIR
          # luarocks --lua-version=5.5 --lua-incdir=/usr/include/lua5.5 --lua-libdir=/usr/lib/x86_64-linux-gnu make
          luarocks --lua-version=5.5 --lua-dir=/usr/bin make
          # luarocks --lua-version=${{ matrix.lua-version }} --local make
      - run: luarocks --lua-version=${{ matrix.lua-version }} list
      - run: luarocks --lua-version=${{ matrix.lua-version }} show lunatic-python
      - run: python -m doctest tests/test_lua.py
      - run: pip install pytest
      - run: pytest
      - run: pytest --doctest-modules
      - run: |
          luarocks --lua-version=${{ matrix.lua-version }} show lunatic-python
          luarocks --lua-version=${{ matrix.lua-version }} config
          echo "lua${{ matrix.lua-version }} tests/test_py.lua"
          echo "---"
          lua${{ matrix.lua-version }} tests/test_py.lua
